<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Gold Saving Plan – Premium Selector</title>

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
  <div class="container my-4">
    <div class="d-flex flex-wrap gap-2 align-items-center justify-content-between mb-3">
      <div>
        <h1 class="fw-bold mb-1">Gold Saving Plan – Premium Selector</h1>
        <div class="text-muted">Select a premium to see the details.</div>
      </div>
      <div class="d-flex flex-wrap gap-2">
        <a class="btn btn-outline-secondary" href="investments.html">← Investment Plans</a>
        <a class="btn btn-success" href="plantation.html">Plantation Home</a>
      </div>
    </div>

    <div class="row g-4">

      <!-- 🔹 PLAN 01 ONLY -->
      <div class="col-12 col-md-8 col-lg-6 mx-auto">
        <div class="card shadow border-0 rounded-4 h-100">
          <div class="card-header bg-primary text-white text-center fs-5 fw-semibold rounded-top-4">
            PLAN – 01
          </div>
          <div class="card-body">
            <label for="premium1" class="form-label fw-semibold">Select Premium</label>
            <select id="premium1" class="form-select mb-3">
              <option value="">— Choose —</option>
            </select>

            <div id="details1" class="d-none">
              <div class="row g-2 mb-3">
                <div class="col-12">
                  <div class="p-3 bg-light rounded-3 border">
                    <div class="small text-muted">Payment</div>
                    <div class="fw-bold" id="payment1"></div>
                  </div>
                </div>
                <div class="col-12">
                  <div class="p-3 bg-light rounded-3 border">
                    <div class="small text-muted">Maturity Year</div>
                    <div class="fw-bold" id="maturityYear1"></div>
                  </div>
                </div>
                <div class="col-12">
                  <div class="p-3 bg-light rounded-3 border">
                    <div class="small text-muted">Maturity (Illustrated)</div>
                    <div class="fw-bold text-success" id="maturityIllustrated1"></div>
                  </div>
                </div>
                <div class="col-12">
                  <div class="p-3 bg-light rounded-3 border">
                    <div class="small text-muted">Maturity (Guaranteed)</div>
                    <div class="fw-bold text-primary" id="maturityGuaranteed1"></div>
                  </div>
                </div>
                <div class="col-12">
                  <div class="p-3 bg-light rounded-3 border">
                    <div class="small text-muted">Terms (Months)</div>
                    <div class="fw-bold" id="termMonths1"></div>
                  </div>
                </div>
              </div>

              <table class="table table-sm align-middle">
                <thead class="table-light">
                  <tr><th>Field</th><th>Value</th></tr>
                </thead>
                <tbody id="table1"></tbody>
              </table>

              <div class="alert alert-success mb-0">Showing details for selected premium.</div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- Bootstrap Bundle JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    // =======================
    //  DATA (Plan 1 only)
    // =======================
    const PLANS = {
      plan1: [
        {id:"one-time",premium:1000000,premiumLabel:"Rs. 1,000,000 (One-time)",payment:"Rs. 1,000,000 at 5 Years",maturityYear:"5 Years",maturityIllustrated:5000000,maturityGuaranteed:2500000,termMonths:"N/A"},
        {id:"23m",premium:30435,premiumLabel:"Rs. 30,435 (23 Months) Pay 40% initially (400,000)",payment:"Rs. 1,100,005 at 5.6 Years",maturityYear:"5.6 Years",maturityIllustrated:5000000,maturityGuaranteed:2500000,termMonths:23},
        {id:"36m",premium:30556,premiumLabel:"Rs. 30,556 (36 Months)",payment:"Rs. 1,100,016 at 6 Years",maturityYear:"6 Years",maturityIllustrated:5000000,maturityGuaranteed:2500000,termMonths:36},
        {id:"48m",premium:22920,premiumLabel:"Rs. 22,920 (48 Months)",payment:"Rs. 1,100,160 at 7 Years",maturityYear:"7 Years",maturityIllustrated:5000000,maturityGuaranteed:2500000,termMonths:48},
        {id:"60m",premium:18335,premiumLabel:"Rs. 18,335 (60 Months)",payment:"Rs. 1,100,100 at 8 Years",maturityYear:"8 Years",maturityIllustrated:5000000,maturityGuaranteed:2500000,termMonths:60}
      ]
    };

    // =======================
    //  UI Logic
    // =======================
    const fmt = n => (typeof n === "number" ? "Rs. " + n.toLocaleString("en-US") : n);

    function fillDropdown(selectEl, data){
      data.forEach(d=>{
        const o=document.createElement("option");
        o.value=d.id;
        o.textContent=d.premiumLabel;
        selectEl.appendChild(o);
      });
    }

    function attachPlan(selectId, detailsId, idsPrefix, data){
      const sel = document.getElementById(selectId);
      const details = document.getElementById(detailsId);
      const map = {
        payment: document.getElementById("payment"+idsPrefix),
        maturityYear: document.getElementById("maturityYear"+idsPrefix),
        maturityIllustrated: document.getElementById("maturityIllustrated"+idsPrefix),
        maturityGuaranteed: document.getElementById("maturityGuaranteed"+idsPrefix),
        termMonths: document.getElementById("termMonths"+idsPrefix),
        table: document.getElementById("table"+idsPrefix)
      };

      fillDropdown(sel, data);

      sel.addEventListener("change", ()=>{
        const chosen = data.find(d=>d.id===sel.value);
        if(!chosen){
          details.classList.add("d-none");
          map.table.innerHTML="";
          return;
        }
        map.payment.textContent = chosen.payment;
        map.maturityYear.textContent = chosen.maturityYear;
        map.maturityIllustrated.textContent = fmt(chosen.maturityIllustrated);
        map.maturityGuaranteed.textContent = fmt(chosen.maturityGuaranteed);
        map.termMonths.textContent = chosen.termMonths;

        // table rows
        map.table.innerHTML = "";
        [
          ["Premium", fmt(chosen.premium)],
          ["Payment", chosen.payment],
          ["Maturity Year", chosen.maturityYear],
          ["Maturity (Illustrated)", fmt(chosen.maturityIllustrated)],
          ["Maturity (Guaranteed)", fmt(chosen.maturityGuaranteed)],
          ["Terms (Months)", chosen.termMonths]
        ].forEach(([k,v])=>{
          const tr=document.createElement("tr");
          tr.innerHTML = `<td>${k}</td><td>${v}</td>`;
          map.table.appendChild(tr);
        });

        details.classList.remove("d-none");
      });
    }

    // Hook up only plan 1
    attachPlan("premium1","details1","1",PLANS.plan1);
  </script>
</body>
</html>
